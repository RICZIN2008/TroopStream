<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKERFLIX</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  body{background:#141414;color:#fff}
  
  header{background:#000;padding:15px 4%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
  header h1{color:#E50914;font-size:28px;cursor:pointer}
  #busca{background:#333;border:1px solid #555;padding:8px 12px;border-radius:4px;color:#fff;width:250px;outline:none}
  #busca:focus{border-color:#E50914}

  .container{padding:30px 4%}
  .categoria{margin-bottom:40px}
  .categoria h2{margin:20px 0 10px;font-size:20px;font-weight:bold}
  .filmes{display:flex;gap:12px;overflow-x:auto;scroll-behavior:smooth;padding:10px 0}
  .filmes::-webkit-scrollbar{height:6px}
  .filmes::-webkit-scrollbar-thumb{background:#E50914;border-radius:10px}
  
  /* CARD COM PLAY */
  .card{min-width:200px;height:300px;background:#222;border-radius:6px;overflow:hidden;position:relative;transition:.3s}
  .card:hover{transform:scale(1.08);z-index:10}
  .card img{width:100%;height:100%;object-fit:cover}
  
  .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;transition:.3s}
  .card:hover .overlay{opacity:1}
  .btn-play{width:60px;height:60px;background:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:24px;color:#000;cursor:pointer;margin-bottom:10px;border:none}
  .btn-play:hover{background:#E50914;color:#fff}
  .card-titulo{font-size:15px;font-weight:bold;text-align:center;padding:0 10px}

  /* PLAYER */
  #player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:999}
  #player video{width:100%;height:100%}
  .fechar{position:absolute;top:20px;right:30px;font-size:50px;color:#fff;cursor:pointer;z-index:1000;transition:.2s}
  .fechar:hover{color:#E50914}
  .loading{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:#E50914}
</style>
</head>
<body>

<header>
  <h1 onclick="location.reload()">HACKERFLIX</h1>
  <input type="text" id="busca" placeholder="Buscar filmes..." onkeyup="buscar()">
</header>

<div class="container">
  
  <!-- CATEGORIA 1: AÇÃO -->
  <div class="categoria">
    <h2>Ação</h2>
    <div class="filmes">
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500/6FfCk87JOM4hN0X9v4x0Z6sF2tC.jpg">
        <div class="overlay">
          <button class="btn-play" onclick="tocar('https://filebin.net/o93326ds3v8p8ar4/M%C3%A1quina.de.Guerra.2026.1080p.WEB-DL.x264.DUAL.5.1.mp4','Máquina de Guerra 2026')">▶</button>
          <div class="card-titulo">Máquina de Guerra 2026</div>
        </div>
      </div>
      
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkLFKBcsWW.jpg">
        <div class="overlay">
          <button class="btn-play" onclick="tocar('SEU_LINK_MP4_2','John Wick 4')">▶</button>
          <div class="card-titulo">John Wick 4</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CATEGORIA 2: FICÇÃO -->
  <div class="categoria">
    <h2>Ficção Científica</h2>
    <div class="filmes">
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500/1XDDXPXGiI8id7MrUxK36ke7gkV.jpg">
        <div class="overlay">
          <button class="btn-play" onclick="tocar('SEU_LINK_MP4_3','Duna Parte 2')">▶</button>
          <div class="card-titulo">Duna Parte 2</div>
        </div>
      </div>
      
      <div class="card">
        <img src="https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg">
        <div class="overlay">
          <button class="btn-play" onclick="tocar('SEU_LINK_MP4_4','Oppenheimer')">▶</button>
          <div class="card-titulo">Oppenheimer</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- PLAYER TELA CHEIA -->
<div id="player">
  <span class="fechar" onclick="fechar()">×</span>
  <div class="loading" id="loading">Carregando...</div>
  <video id="video" controls></video>
</div>

<script>
function tocar(link, titulo){
  document.getElementById('player').style.display = 'block';
  document.getElementById('loading').style.display = 'block';
  let v = document.getElementById('video');
  v.src = link;
  v.load();
  v.oncanplay = () => {document.getElementById('loading').style.display = 'none'; v.play()}
  document.title = titulo + ' - HACKERFLIX';
}

function fechar(){
  let v = document.getElementById('video');
  v.pause();
  v.src = '';
  document.getElementById('player').style.display = 'none';
  document.title = 'HACKERFLIX';
}

document.addEventListener('keydown', e => { if(e.key === 'Escape') fechar() })

function buscar(){
  let input = document.getElementById('busca').value.toLowerCase();
  let categorias = document.querySelectorAll('.categoria');
  categorias.forEach(cat => {
    let cards = cat.querySelectorAll('.card');
    let temVisivel = false;
    cards.forEach(card => {
      let texto = card.innerText.toLowerCase();
      if(texto.includes(input)){
        card.style.display = 'block';
        temVisivel = true;
      } else {
        card.style.display = 'none';
      }
    })
    cat.style.display = temVisivel ? 'block' : 'none';
  })
}
</script>

</body>
</html>
