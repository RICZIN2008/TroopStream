<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HACKERFLIX</title>
<style>
  :root { --green: #00ff41; --bg: #010a01; --card: #021102; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
  body { background: var(--bg); color: var(--green); overflow-x: hidden; }

  header { background: var(--card); border-bottom: 2px solid var(--green); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 999; }
  header h1 { font-size: 18px; text-shadow: 0 0 10px var(--green); }

  nav { display: flex; justify-content: center; gap: 10px; padding: 10px; background: var(--card); border-bottom: 1px solid #003b00; position: sticky; top: 44px; z-index: 998; }
  nav button { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
  nav button.active, nav button:hover { background: var(--green); color: #000; }

.container { padding: 15px; width: 100%; max-width: 1400px; margin: auto; }
.categoria { display: none; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
.categoria.active { display: grid; }

.card { background: var(--card); border: 1px solid #003b00; border-radius: 5px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
.card:hover { border-color: var(--green); transform: scale(1.03); }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #000; display: block; }
.card h3 { padding: 8px; font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #000; border-top: 1px solid #003b00; }

  /* PLAYER */
  #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
  #videoWrapper { width: 95%; max-width: 900px; position: relative; }
  iframe { width: 100%; aspect-ratio: 16/9; max-height: 60vh; background: #000; border: 2px solid var(--green); border-radius: 8px; }
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--green); font-size: 14px; z-index: 2; }

.btn-fechar { background: var(--green); color: #000; border: none; padding: 8px 20px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.2s; }
.btn-fechar:hover { filter: brightness(1.2); }

  /* QUANDO ENTRAR EM TELA CHEIA - ESCONDE TUDO */
  #player:fullscreen.btn-fechar,
  #player:-webkit-full-screen.btn-fechar { display: none!important; }

  #player:fullscreen #videoWrapper,
  #player:-webkit-full-screen #videoWrapper { width: 100%!important; height: 100%!important; max-width: none!important; padding: 0; }

  #player:fullscreen iframe,
  #player:-webkit-full-screen iframe { height: 100%!important; width: 100%!important; max-height: none!important; border: none!important; border-radius: 0!important; aspect-ratio: auto!important; }

  @media (orientation: landscape) {
 .categoria { grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; }
 .card img { max-height: 35vh; }
  header, nav { padding: 6px; }
  }
</style>
</head>
<body>

<header><h1>> HACKERFLIX.exe</h1></header>

<nav>
  <button onclick="mostrarCategoria('filmes', this)" class="active">[FILMES]</button>
  <button onclick="mostrarCategoria('series', this)">[SERIES]</button>
  <button onclick="mostrarCategoria('animes', this)">[ANIMES]</button>
</nav>

<div class="container">
  <div id="filmes" class="categoria active"></div>
  <div id="series" class="categoria"></div>
  <div id="animes" class="categoria"></div>
</div>

<div id="player" onclick="handlePlayerClick(event)">
  <div id="videoWrapper">
    <div class="loading" id="loading">CARREGANDO...</div>
    <iframe id="video" allowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; encrypted-media" frameborder="0" referrerpolicy="no-referrer"></iframe>
  </div>
  <button class="btn-fechar" onclick="fecharVideo(event)">[X] FECHAR</button>
</div>

<script>
  const videos = {
    filmes: [
      {id: 'V6VPMJ77vgSKr7z', nome: 'MÁQUINA DE GUERRA 2026', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0005.png'},
      {id: '0BQKmpzWWbHb972', nome: 'Como Mágica', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/images%20(21).jpeg'},
      {id: '3xdbv6m1lWuddxV', nome: 'Super Mario Galaxy', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/smg-home-header-mobile.png'},
      {id: 'g9gWA61gm3sqD8q', nome: 'Homem-Aranha', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/hhRD5m-w4L7Gje7FgahvaeKS5NLEYJVDSQsmbNqvmi-L51PlpyVJnGr6M3siA5LIn9r4ry0wVQsBHxRJXAc.png'},
      {id: 'lkMMBoqZlgc7YX6', nome: 'Michael', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0002.jpg'},
      {id: '2kr27ed2WpIZ0q1', nome: 'Oppenheimer', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0037.jpg'},
      {id: 'kPBgWMO1xjtOVpw', nome: 'Devoradores de Estrelas', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/0051bc7965f851f46f856d4119741487.jpeg'},
    ],
    series: [],
    animes: []
  };

  let carregando = false;
  const player = document.getElementById('player');

  function carregarVideos() {
    for(let cat in videos){
      const container = document.getElementById(cat);
      let html = '';
      videos[cat].forEach(v => {
        html += `<div class="card" data-id="${v.id}"><img src="${v.capa}" loading="lazy" onerror="this.src='https://placehold.co/300x400/003b00/00ff41?text=SEM+CAPA'"><h3>${v.nome}</h3></div>`;
      });
      container.innerHTML = html;
    }
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(){ abrirVideo(this.dataset.id); });
    });
  }

  function mostrarCategoria(id, btn) {
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function abrirVideo(fileid) {
    if(carregando) return;
    carregando = true;
    player.style.display = 'flex';
    document.getElementById('loading').style.display = 'block';
    const iframe = document.getElementById('video');
    iframe.src = '';
    setTimeout(() => {
      iframe.src = `https://stape.me/e/${fileid}`;
      iframe.onload = () => {
        document.getElementById('loading').style.display = 'none';
        carregando = false;
        // Força fullscreen se já estiver deitado
        if(window.innerHeight < window.innerWidth) toggleFullscreen();
      }
    }, 200);
  }

  // NOVO: Captura clique no botão [ ] do player
  function handlePlayerClick(e){
    // Se clicou dentro do iframe não faz nada
    if(e.target.tagName === 'IFRAME') return;
    // Se clicou no fundo preto do player, fecha
    if(e.target.id === 'player') fecharVideo(e);
  }

  function toggleFullscreen(){
    if(!document.fullscreenElement){
      if(player.requestFullscreen) player.requestFullscreen();
      else if(player.webkitRequestFullscreen) player.webkitRequestFullscreen();
    } else {
      if(document.exitFullscreen) document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  }

  // GAMBIARRA: Escuta mensagem do iframe pedindo fullscreen
  window.addEventListener('message', (event) => {
    if(event.data === 'requestFullscreen' || event.data.type === 'requestFullscreen'){
      toggleFullscreen();
    }
  });

  function fecharVideo(e) {
    if(e) e.stopPropagation();
    if(document.exitFullscreen) document.exitFullscreen();
    if(document.webkitExitFullscreen) document.webkitExitFullscreen();

    player.style.display = 'none';
    document.getElementById('video').src = '';
    document.getElementById('loading').style.display = 'none';
    carregando = false;
  }

  // ESC fecha tudo
  document.addEventListener('keydown', e => { if(e.key === 'Escape') fecharVideo(); });

  // Detecta quando sai do fullscreen pelo botão do player
  document.addEventListener('fullscreenchange', () => {
    if(!document.fullscreenElement && player.style.display === 'flex'){
      // não fecha, só sai do full
    }
  });

  window.addEventListener('load', carregarVideos);
</script>

</body>
</html>
