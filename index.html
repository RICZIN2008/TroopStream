<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Vídeo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .video-container {
            width: 90%;
            max-width: 800px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }
        video {
            width: 100%;
            display: block;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Visualizando Vídeo do Pixeldrain</h1>

    <div class="video-container">
        <video controls autoplay muted playsinline>
            <source src="https://pixeldrain.com/api/file/Gtbg58Bk" type="video/mp4">
            Seu navegador não suporta a tag de vídeo do HTML5.
        </video>
    </div>

</body>
</html>
