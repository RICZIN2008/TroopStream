<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKERFLIX</title>
<style>
  :root { --green: #00ff41; --bg: #010a01; --card: #021102; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
  body { background: var(--bg); color: var(--green); }
  header { background: var(--card); border-bottom: 2px solid var(--green); padding: 12px; text-align: center; }
  header h1 { font-size: 18px; text-shadow: 0 0 10px var(--green); }
  nav { display: flex; justify-content: center; gap: 10px; padding: 10px; background: var(--card); }
  nav button { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
  nav button.active, nav button:hover { background: var(--green); color: #000; }
.container { padding: 15px; max-width: 1400px; margin: auto; }
.categoria { display: none; grid-template-columns: repeat(3, 1fr); gap: 15px; }
.categoria.active { display: grid; }
.card { background: var(--card); border: 1px solid #003b00; border-radius: 5px; overflow: hidden; cursor: pointer; }
.card:hover { border-color: var(--green); }
.card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
.card h3 { padding: 10px; font-size: 13px; text-align: center; background: #000; }

  /* PLAYER PRÓPRIO */
  #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
  #videoWrapper { width: 95%; max-width: 1100px; position: relative; }
  video { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--green); display: block; }

  /* CONTROLES YT */
 .controls { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 10px; display: flex; align-items: center; gap: 10px; opacity: 0; transition: 0.3s; }
  #videoWrapper:hover.controls { opacity: 1; }
 .btn { background: none; border: none; color: var(--green); font-size: 20px; cursor: pointer; }
 .progress { flex: 1; height: 5px; background: #444; cursor: pointer; }
 .progress-bar { height: 100%; width: 0%; background: var(--green); }
 .tempo { font-size: 12px; }

  #player:fullscreen #videoWrapper { width: 100%; height: 100%; max-width: none; }
  #player:fullscreen video { height: 100%; border: none; }
</style>
</head>
<body>

<header><h1>> HACKERFLIX.exe</h1></header>

<nav>
  <button onclick="mostrarCategoria('filmes', this)" class="active">[FILMES]</button>
  <button onclick="mostrarCategoria('series', this)">[SERIES]</button>
  <button onclick="mostrarCategoria('animes', this)">[ANIMES]</button>
</nav>

<div class="container">
  <div id="filmes" class="categoria active"></div>
  <div id="series" class="categoria"></div>
  <div id="animes" class="categoria"></div>
</div>

<div id="player">
  <div id="videoWrapper">
    <video id="video" playsinline></video>
    <div class="controls" id="controls">
      <button class="btn" id="playBtn">▶</button>
      <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
      <span class="tempo" id="tempo">00:00 / 00:00</span>
      <button class="btn" id="volBtn">🔊</button>
      <button class="btn" id="fullBtn">[ ]</button>
      <button class="btn" id="closeBtn">✕</button>
    </div>
  </div>
</div>

<script>
  const videos = {
    filmes: [
      {id: 'V6VPMJ77vgSKr7z', nome: 'MÁQUINA DE GUERRA 2026', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0005.png'},
      {id: '0BQKmpzWWbHb972', nome: 'Como Mágica', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/images%20(21).jpeg'},
    ]
  };

  const player = document.getElementById('player');
  const video = document.getElementById('video');

  function carregarVideos() {
    for(let cat in videos){
      const container = document.getElementById(cat);
      let html = '';
      videos[cat].forEach(v => {
        // ATENÇÃO: stape não dá mp4 direto. Isso aqui não vai rodar
        html += `<div class="card" data-id="${v.id}"><img src="${v.capa}"><h3>${v.nome}</h3></div>`;
      });
      container.innerHTML = html;
    }
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(){ abrirVideo(this.dataset.id); });
    });
  }

  function abrirVideo(fileid) {
    player.style.display = 'flex';
    // AQUI QUE ESTÁ O PROBLEMA: Precisamos do.mp4
    // stape.me/e/ID não é mp4. É página.
    // video.src = `https://stape.me/d/${fileid}.mp4`; // ISSO NÃO FUNCIONA
    video.src = `https://stape.me/e/${fileid}`; // vai dar erro
    video.play();
  }

  // CONTROLES
  document.getElementById('playBtn').onclick = () => video.paused? video.play() : video.pause();
  document.getElementById('fullBtn').onclick = () => player.requestFullscreen();
  document.getElementById('closeBtn').onclick = () => { player.style.display='none'; video.src=''; }
  video.onplay = () => playBtn.textContent = '⏸';
  video.onpause = () => playBtn.textContent = '▶';
  video.ontimeupdate = () => {
    progressBar.style.width = (video.currentTime / video.duration) * 100 + '%';
    tempo.textContent = `${format(video.currentTime)} / ${format(video.duration)}`;
  }
  function format(s){ return new Date(s*1000).toISOString().substr(14,5) }

  function mostrarCategoria(id, btn) {
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  window.addEventListener('load', carregarVideos);
</script>
</body>
</html>
