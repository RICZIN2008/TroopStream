<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKERFLIX</title>
<style>
  :root { --green: #00ff41; --bg: #010a01; --card: #021102; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
  body { background: var(--bg); color: var(--green); }
  header { background: var(--card); border-bottom: 2px solid var(--green); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; text-shadow: 0 0 10px var(--green); }
  nav { display: flex; justify-content: center; gap: 10px; padding: 10px; background: var(--card); border-bottom: 1px solid #003b00; }
  nav button { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
  nav button.active, nav button:hover { background: var(--green); color: #000; }
.container { padding: 15px; width: 100%; margin: auto; }
.categoria { display: none; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; } /* 3 FIXO NO PC */
.categoria.active { display: grid; }
.card { background: var(--card); border: 1px solid #003b00; border-radius: 5px; overflow: hidden; cursor: pointer; transition: transform 0.2s; min-width: 0; }
.card:hover { border-color: var(--green); transform: scale(1.03); }
.card img { width: 100%; height: 280px; object-fit: cover; background: #000; display: block; }
.card h3 { padding: 10px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #000; border-top: 1px solid #003b00; pointer-events: none; }
  #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
  #videoWrapper { width: 95%; max-width: 1100px; position: relative; }
  iframe { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--green); }
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--green); font-size: 14px; }
.btn-fechar { background: var(--green); color: #000; border: none; padding: 8px 20px; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; z-index: 1001; }

@media(max-width: 900px){.categoria { grid-template-columns: repeat(2, 1fr); } } /* 2 NO TABLET */
@media(max-width: 500px){.categoria { grid-template-columns: repeat(2, 1fr); }.card img { height: 220px; } } /* 2 NO CELULAR */
</style>
</head>
<body>

<header><h1>> HACKERFLIX.exe</h1></header>

<nav>
  <button onclick="mostrarCategoria('filmes', this)" class="active">[FILMES]</button>
  <button onclick="mostrarCategoria('series', this)">[SERIES]</button>
  <button onclick="mostrarCategoria('animes', this)">[ANIMES]</button>
</nav>

<div class="container">
  <div id="filmes" class="categoria active"></div>
  <div id="series" class="categoria"></div>
  <div id="animes" class="categoria"></div>
</div>

<div id="player">
  <div id="videoWrapper">
    <div class="loading" id="loading">CARREGANDO...</div>
    <iframe id="video" allowfullscreen allow="autoplay; fullscreen" frameborder="0" referrerpolicy="no-referrer"></iframe>
  </div>
  <button class="btn-fechar" onclick="fecharVideo()">[X] FECHAR</button>
</div>

<script>
  // COLOCA ID + NOME + CAPA AQUI. ACEITA.png.jpg.webp
  const videos = {
    filmes: [
      {id: 'V6VPMJ77vgSKr7z', nome: 'MÁQUINA DE GUERRA 2026', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0005.png'},
      {id: '0BQKmpzWWbHb972', nome: 'Como Mágica', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/images%20(21).jpeg'},
      {id: '3xdbv6m1lWuddxV', nome: 'Super Mario Galaxy', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/smg-home-header-mobile.png'},
      {id: 'g9gWA61gm3sqD8q', nome: 'Homem-Aranha', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/hhRD5m-w4L7Gje7FgahvaeKS5NLEYJVDSQsmbNqvmi-L51PlpyVJnGr6M3siA5LIn9r4ry0wVQsBHxRJXAc.png'},
      {id: 'lkMMBoqZlgc7YX6', nome: 'Michael', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0002.jpg'},
      {id: 'ID_DO_VIDEO_6', nome: 'Oppenheimer', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0037.jpg'}
    ],
    series: [],
    animes: []
  };

  let carregando = false;

  function carregarVideos() {
    for(let cat in videos){
      const container = document.getElementById(cat);
      let html = '';
      videos[cat].forEach(v => {
        html += `
          <div class="card" data-id="${v.id}">
            <img src="${v.capa}" loading="lazy" onerror="this.src='https://placehold.co/300x400/003b00/00ff41?text=SEM+CAPA'">
            <h3>${v.nome}</h3>
          </div>
        `;
      });
      container.innerHTML = html;
    }
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(){
        abrirVideo(this.dataset.id);
      });
    });
  }

  function mostrarCategoria(id, btn) {
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function abrirVideo(fileid) {
    if(carregando) return;
    carregando = true;
    document.getElementById('player').style.display = 'flex';
    document.getElementById('loading').style.display = 'block';
    const iframe = document.getElementById('video');
    iframe.src = '';
    setTimeout(() => {
      iframe.src = `https://stape.me/e/${fileid}`;
      iframe.onload = () => {
        document.getElementById('loading').style.display = 'none';
        carregando = false;
      }
    }, 200);
  }

  function fecharVideo() {
    document.getElementById('player').style.display = 'none';
    document.getElementById('video').src = '';
    document.getElementById('loading').style.display = 'none';
    carregando = false;
  }

  window.addEventListener('load', carregarVideos);
</script>

</body>
</html>
