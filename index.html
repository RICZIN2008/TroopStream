<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troop Stream</title>
<style>
  :root { --green: #00ff41; --bg: #010a01; --card: #021102; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
  body { background: var(--bg); color: var(--green); }
  header { background: var(--card); border-bottom: 2px solid var(--green); padding: 12px; text-align: center; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; text-shadow: 0 0 10px var(--green); }
  nav { display: flex; justify-content: center; gap: 10px; padding: 10px; background: var(--card); border-bottom: 1px solid #003b00; }
  nav button { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 6px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
  nav button.active, nav button:hover { background: var(--green); color: #000; }
.container { padding: 15px; width: 100%; margin: auto; }
.categoria { display: none; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
.categoria.active { display: grid; }
.card { background: var(--card); border: 1px solid #003b00; border-radius: 5px; overflow: hidden; cursor: pointer; transition: transform 0.2s; min-width: 0; }
.card:hover { border-color: var(--green); transform: scale(1.03); }
.card img { width: 100%; height: 280px; object-fit: cover; background: #000; display: block; }
.card h3 { padding: 10px; font-size: 13px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #000; border-top: 1px solid #003b00; }
  
/* PLAYER NORMAL */
  #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; justify-content: center; align-items: center; z-index: 1000; }
  #videoWrapper { width: 95%; max-width: 1100px; position: relative; }
  iframe { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--green); display: block; }
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--green); font-size: 14px; }

.btn-voltar { position: absolute; top: 10px; left: 10px; background: rgba(0,255,65,0.9); border: none; color: #000; width: 40px; height: 40px; border-radius: 6px; font-size: 22px; font-weight: bold; cursor: pointer; z-index: 1003; display: none; align-items: center; justify-content: center; }
.btn-voltar:hover { background: var(--green); transform: scale(1.1); }
.btn-expandir { position: absolute; bottom: 10px; right: 10px; width: 40px; height: 40px; background: rgba(0,255,65,0.9); border: none; border-radius: 6px; color: #000; font-size: 20px; font-weight: bold; cursor: pointer; z-index: 1003; display: none; }
.btn-expandir:hover { background: var(--green); transform: scale(1.1); }

/* TELA DE DETALHES */
#telaDetalhes { display: none; padding: 20px; max-width: 900px; margin: 0 auto; background: var(--bg); }
#capaDetalhe { width: 100%; max-height: 450px; object-fit: cover; border: 2px solid var(--green); margin-bottom: 15px; border-radius: 5px; }
#tituloDetalhe { text-align: center; font-size: 22px; margin-bottom: 15px; text-shadow: 0 0 5px var(--green); }
#listaEpisodios { display: grid; gap: 8px; }
.ep,.btn-assistir { background: var(--card); border: 1px solid #003b00; padding: 14px; cursor: pointer; text-align: center; transition: 0.2s; border-radius: 4px; font-weight: bold; font-size: 16px; }
.ep:hover,.btn-assistir:hover { background: var(--green); color: #000; border-color: var(--green); }

@media(max-width: 900px){.categoria { grid-template-columns: repeat(2, 1fr); }}
@media(max-width: 500px){.categoria { grid-template-columns: repeat(2, 1fr); }.card img { height: 220px; }}

/* FULLSCREEN 100% CORRIGIDO - FORÇA TUDO */
#player:fullscreen,
#player:-webkit-full-screen {
  width: 100vw!important;
  height: 100vh!important;
  padding: 0!important;
  margin: 0!important;
  background: #000!important;
}
#player:fullscreen #videoWrapper,
#player:-webkit-full-screen #videoWrapper {
  width: 100vw!important;
  height: 100vh!important;
  max-width: 100vw!important;
  padding: 0!important;
  margin: 0!important;
  display: flex;
  align-items: center;
  justify-content: center;
}
#player:fullscreen iframe,
#player:-webkit-full-screen iframe {
  width: 100vw!important;
  height: 100vh!important;
  border: none!important;
  aspect-ratio: unset!important;
  object-fit: fill!important;
}
</style>
</head>
<body>

<header><h1>> Troop Stream</h1></header>

<nav>
  <button onclick="mostrarCategoria('filmes', this)" class="active">[FILMES]</button>
  <button onclick="mostrarCategoria('series', this)">[SERIES]</button>
  <button onclick="mostrarCategoria('animes', this)">[ANIMES]</button>
</nav>

<div class="container">
  <div id="filmes" class="categoria active"></div>
  <div id="series" class="categoria"></div>
  <div id="animes" class="categoria"></div>
</div>

<div id="telaDetalhes">
  <button onclick="voltarCategorias()" style="background:var(--green);color:#000;border:none;padding:8px 15px;margin-bottom:15px;cursor:pointer;border-radius:4px;font-weight:bold;">← VOLTAR</button>
  <h2 id="tituloDetalhe"></h2>
  <img id="capaDetalhe" src="">
  <div id="listaEpisodios"></div>
</div>

<div id="player">
  <div id="videoWrapper">
    <div class="loading" id="loading">CARREGANDO...</div>
    <iframe id="video" allowfullscreen allow="autoplay; fullscreen" frameborder="0" referrerpolicy="no-referrer"></iframe>
    <button id="btnVoltar" class="btn-voltar" onclick="fecharVideo()">←</button>
    <button id="btnExpandir" class="btn-expandir" onclick="toggleFullscreen()">[ ]</button>
  </div>
</div>

<script>
  const videos = {
    filmes: [
      {id: 'V6VPMJ77vgSKr7z', nome: 'MÁQUINA DE GUERRA 2026', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0005.png'},
      {id: '0BQKmpzWWbHb972', nome: 'Como Mágica', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/images%20(21).jpeg'},
      {id: '3xdbv6m1lWuddxV', nome: 'Super Mario Galaxy', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/smg-home-header-mobile.png'},
      {id: 'g9gWA61gm3sqD8q', nome: 'Homem-Aranha', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/hhRD5m-w4L7Gje7FgahvaeKS5NLEYJVDSQsmbNqvmi-L51PlpyVJnGr6M3siA5LIn9r4ry0wVQsBHxRJXAc.png'},
      {id: 'lkMMBoqZlgc7YX6', nome: 'Michael', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0002.jpg'},
      {id: '2kr27ed2WpIZ0q1', nome: 'Oppenheimer', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/IMG-20260716-WA0037.jpg'},
      {id: 'kPBgWMO1xjtOVpw', nome: 'Devoradores de Estrelas', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/0051bc7965f851f46f856d4119741487.jpeg'},
      {id: 'Dj3xLeXYbQsDog', nome: 'Interestelar 2014', capa: 'https://raw.githubusercontent.com/RICZIN2008/Imagens/refs/heads/main/71BzANSCGHL._AC_UF894,1000_QL80_.jpg'},
    ],
    series: [
      {
        nome: 'O Mentalista',
        capa: 'https://github.com/RICZIN2008/Imagens/raw/refs/heads/main/images%20(4).jpeg',
        episodios: [
          {id: 'OxrqvvY7K9i6Me', nome: 'Episódio 1'},
          {id: 'aRxlrY8RbpsJxx', nome: 'Episódio 2'},
          {id: 'L1JvgOwM3xCeYQ', nome: 'Episódio 3'},
          {id: 'VGqzXAjQb1fy7z', nome: 'Episódio 4'},
          {id: 'BA8QjVR06KUyOz1', nome: 'Episódio 5'},
          {id: 'zDpKwbPBo2IY6bJ', nome: 'Episódio 6'},
          {id: 'ZPRgQ7jPzLTqL1x', nome: 'Episódio 7'},
          {id: 'zK9kpWvzd9fYwpk', nome: 'Episódio 8'},
          {id: '9WLoVwXW1wHakoO', nome: 'Episódio 9'},
          {id: 'Y8oyv6mbPYuvyjQ', nome: 'Episódio 10'},
        ]
      },
      {
        nome: 'offffffff',
        capa: 'https://img.magnific.com/fotos-gratis/fundo-abstrato-escuro_1048-1920.jpg',
        episodios: [
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 1'},
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 2'}
        ]
      }
    ],
    animes: [
      {
        nome: 'offffffff',
        capa: 'https://img.magnific.com/fotos-gratis/fundo-abstrato-escuro_1048-1920.jpg',
        episodios: [
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 1'},
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 2'}
        ]
      },
      {
        nome: 'offffffff',
        capa: 'https://img.magnific.com/fotos-gratis/fundo-abstrato-escuro_1048-1920.jpg',
        episodios: [
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 1'},
          {id: 'g9gWA61gm3yyD8q', nome: 'Episódio 2'}
        ]
      }
    ]
  };

  let carregando = false;

  function carregarVideos() {
    for(let cat in videos){
      const container = document.getElementById(cat);
      let html = '';
      videos[cat].forEach((v, index) => {
        html += `<div class="card" onclick="abrirDetalhes('${cat}', ${index})"><img src="${v.capa}" loading="lazy" onerror="this.src='https://placehold.co/300x400/003b00/00ff41?text=SEM+CAPA'"><h3>${v.nome}</h3></div>`;
      });
      container.innerHTML = html;
    }
  }

  function mostrarCategoria(id, btn) {
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('telaDetalhes').style.display = 'none';
    document.getElementById('player').style.display = 'none';
    document.querySelector('.container').style.display = 'block';
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function abrirDetalhes(cat, index) {
    const item = videos[cat][index];
    document.querySelector('.container').style.display = 'none';
    document.getElementById('telaDetalhes').style.display = 'block';

    document.getElementById('tituloDetalhe').innerText = item.nome;
    document.getElementById('capaDetalhe').src = item.capa;

    let html = '';
    if(cat === 'filmes'){
      html = `<div class="btn-assistir" onclick="abrirVideo('${item.id}')">▶ ASSISTIR AGORA</div>`;
    } else {
      item.episodios.forEach((ep, i) => {
        html += `<div class="ep" onclick="abrirVideo('${ep.id}')">${ep.nome}</div>`;
      });
    }
    document.getElementById('listaEpisodios').innerHTML = html;
  }

  function abrirVideo(fileid) {
    if(carregando) return;
    carregando = true;
    document.getElementById('player').style.display = 'flex';
    document.getElementById('btnExpandir').style.display = 'block';
    document.getElementById('btnVoltar').style.display = 'flex';
    document.getElementById('loading').style.display = 'block';
    const iframe = document.getElementById('video');
    iframe.src = '';
    setTimeout(() => {
      iframe.src = `https://stape.me/e/${fileid}`;
      iframe.onload = () => {
        document.getElementById('loading').style.display = 'none';
        carregando = false;
      }
    }, 200);
  }

  function toggleFullscreen(){
    const player = document.getElementById('player');
    const btnVoltar = document.getElementById('btnVoltar');
    if(!document.fullscreenElement){
      player.requestFullscreen().catch(err => {});
      btnVoltar.style.display = 'none';
    } else {
      document.exitFullscreen();
      btnVoltar.style.display = 'flex';
    }
  }

  function fecharVideo() {
    if(document.exitFullscreen) document.exitFullscreen();
    document.getElementById('player').style.display = 'none';
    document.getElementById('video').src = '';
    document.getElementById('loading').style.display = 'none';
    carregando = false;
  }

  function voltarCategorias(){
    document.getElementById('telaDetalhes').style.display = 'none';
    document.querySelector('.container').style.display = 'block';
  }

  window.addEventListener('load', carregarVideos);
</script>

</body>
</html>
