<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKERFLIX DASHBOARD</title>
<style>
  :root { --green: #00ff41; --bg: #010a01; --card: #021102; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }
  body { background: var(--bg); color: var(--green); }
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03), rgba(0,255,65,0.03) 1px, transparent 1px, transparent 2px);
    pointer-events: none; z-index: 1; }

  header { background: var(--card); border-bottom: 2px solid var(--green); padding: 15px 30px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 22px; text-shadow: 0 0 10px var(--green); }

 .add-panel { margin: 20px; padding: 20px; background: var(--card); border: 1px solid var(--green); border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
.add-panel input,.add-panel select { background: #000; border: 1px solid var(--green); color: var(--green); padding: 10px; border-radius: 5px; width: 200px; }
.add-panel button { background: var(--green); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

  nav { display: flex; justify-content: center; gap: 20px; padding: 15px; }
  nav button { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
  nav button.active, nav button:hover { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green); }

.container { padding: 20px; max-width: 1400px; margin: auto; z-index: 2; position: relative; }
.categoria { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.categoria.active { display: grid; }

.card { background: var(--card); border: 1px solid #003b00; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; }
.card:hover { transform: scale(1.05); border-color: var(--green); box-shadow: 0 0 25px #003b00; }
.card img { width: 100%; height: 300px; object-fit: cover; }
.card h3 { padding: 12px; font-size: 14px; text-align: center; }

  /* PLAYER ESTILO YOUTUBE */
  #player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
  #videoWrapper { position: relative; width: 95%; max-width: 1200px; }
  video { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--green); border-radius: 8px; outline: none; }
  
  /* CONTROLES CUSTOM */
 .controls { width: 95%; max-width: 1200px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 0 0 8px 8px; margin-top: -5px; }
.progress { width: 100%; height: 5px; background: #333; cursor: pointer; border-radius: 5px; }
.progress-filled { height: 100%; background: var(--green); width: 0%; border-radius: 5px; }
.bottom-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.bottom-controls button { background: none; border: none; color: var(--green); font-size: 18px; cursor: pointer; padding: 5px 10px; }
.bottom-controls input[type=range] { width: 100px; accent-color: var(--green); }
.time { font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>> HACKERFLIX_DASHBOARD.exe</h1>
  <div>SYSTEM: ONLINE</div>
</header>

<div class="add-panel">
  <input type="text" id="titulo" placeholder="> TITULO">
  <input type="text" id="capa" placeholder="> URL_CAPA.jpg">
  <input type="text" id="link" placeholder="> URL_VIDEO.mp4">
  <select id="categoria">
    <option value="filmes">FILMES</option>
    <option value="series">SERIES</option>
    <option value="animes">ANIMES</option>
  </select>
  <button onclick="adicionarVideo()">[ + ADD ]</button>
</div>

<nav>
  <button onclick="mostrarCategoria('filmes')" class="active">[FILMES]</button>
  <button onclick="mostrarCategoria('series')">[SERIES]</button>
  <button onclick="mostrarCategoria('animes')">[ANIMES]</button>
</nav>

<div class="container">
  <!-- FILMES - 2 EXEMPLOS -->
  <div id="filmes" class="categoria active">
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=MATRIX" onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">> MATRIX_EXEMPLO_1</h3>
    </div>
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=JOHN_WICK" onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">> JOHN_WICK_EXEMPLO_2</h3>
    </div>
  </div>

  <!-- SERIES - 2 EXEMPLOS -->
  <div id="series" class="categoria">
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=BREAKING_BAD" onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">> BREAKING_BAD_S01E01</h3>
    </div>
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=STRANGER" onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">> STRANGER_THINGS_S01E01</h3>
    </div>
  </div>

  <!-- ANIMES - 2 EXEMPLOS -->
  <div id="animes" class="categoria">
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=NARUTO" onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/mov_bbb.mp4')">> NARUTO_EP_01</h3>
    </div>
    <div class="card">
      <img src="https://placehold.co/220x300/003b00/00ff41?text=ONE_PIECE" onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">
      <h3 onclick="abrirVideo('https://www.w3schools.com/html/movie.mp4')">> ONE_PIECE_EP_01</h3>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player">
  <div id="videoWrapper">
    <video id="video"></video>
  </div>
  <div class="controls">
    <div class="progress" onclick="setProgress(event)">
      <div class="progress-filled"></div>
    </div>
    <div class="bottom-controls">
      <div>
        <button onclick="playPause()">⏯️</button>
        <button onclick="voltar10()">⏪10</button>
        <button onclick="avancar10()">10⏩</button>
        <button onclick="toggleMute()">🔊</button>
        <input type="range" min="0" max="1" step="0.1" value="1" onchange="setVolume(this.value)">
        <span class="time" id="time">00:00 / 00:00</span>
      </div>
      <div>
        <select onchange="setSpeed(this.value)" style="background:#000; color:var(--green); border:1px solid var(--green);">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <button onclick="expandir()">⛶</button>
        <button onclick="fecharVideo()">✖</button>
      </div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const progress = document.querySelector('.progress-filled');

  function mostrarCategoria(id) {
    document.querySelectorAll('.categoria').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
  }

  function abrirVideo(link) {
    document.getElementById('player').style.display = 'flex';
    video.src = link;
    video.play();
  }

  function fecharVideo() {
    document.getElementById('player').style.display = 'none';
    video.pause();
    video.src = '';
  }

  function playPause() { video.paused ? video.play() : video.pause(); }
  function voltar10() { video.currentTime -= 10; }
  function avancar10() { video.currentTime += 10; }
  function toggleMute() { video.muted =!video.muted; }
  function setVolume(val) { video.volume = val; }
  function setSpeed(val) { video.playbackRate = val; }
  function expandir() { document.getElementById('videoWrapper').requestFullscreen(); }

  video.addEventListener('timeupdate', () => {
    const percent = (video.currentTime / video.duration) * 100;
    progress.style.width = `${percent}%`;
    document.getElementById('time').innerText = `${formatar(video.currentTime)} / ${formatar(video.duration)}`;
  });

  function setProgress(e) {
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    video.currentTime = (clickX / width) * video.duration;
  }

  function formatar(s) {
    return new Date(s * 1000).toISOString().substr(11, 8);
  }

  // Atalhos teclado
  document.addEventListener('keydown', e => {
    if(e.key === ' ') playPause();
    if(e.key === 'f') expandir();
    if(e.key === 'Escape') fecharVideo();
    if(e.key === 'ArrowRight') avancar10();
    if(e.key === 'ArrowLeft') voltar10();
  });

  function adicionarVideo() {
    alert("Edite os 6 cards direto no código trocando o link. Ou me peça versão com BD.");
  }
</script>

</body>
</html>
